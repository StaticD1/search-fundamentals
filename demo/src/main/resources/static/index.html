<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Векторный поиск</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: auto; }
        .search-box { width: 100%; padding: 10px; font-size: 16px; }
        .search-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Поиск документов</h1>
    <input type="text" id="query" class="search-box" placeholder="Введите запрос...">
    <button id="searchBtn" class="search-btn">Искать</button>
    <div id="error" class="error"></div>
    <table id="results">
        <thead>
        <tr>
            <th>Документ</th>
            <th>Оценка (score)</th>
        </tr>
        </thead>
        <tbody>
        <!-- результаты будут вставлены сюда -->
        </tbody>
    </table>
</div>

<script>
    document.getElementById('searchBtn').addEventListener('click', function() {
        const query = document.getElementById('query').value.trim();
        if (!query) return;

        const errorDiv = document.getElementById('error');
        errorDiv.textContent = '';

        fetch(`/api/search?q=${encodeURIComponent(query)}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка сервера');
                }
                return response.json();
            })
            .then(data => {
                const tbody = document.querySelector('#results tbody');
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2">Ничего не найдено</td></tr>';
                } else {
                    data.forEach(item => {
                        const row = tbody.insertRow();
                        row.insertCell().textContent = item.docId;
                        row.insertCell().textContent = item.score.toFixed(6);
                    });
                }
            })
            .catch(error => {
                errorDiv.textContent = 'Ошибка: ' + error.message;
            });
    });

    // Поддержка Enter в поле ввода
    document.getElementById('query').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('searchBtn').click();
        }
    });
</script>
</body>
</html>
